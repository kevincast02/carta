<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ábreme ❤️</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffd6e8, #f8a1c4, #ffdde1);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: white;
      border-radius: 28px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 18px 40px rgba(130, 20, 70, 0.25);
      overflow: hidden;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
      animation: aparecer 0.7s ease;
    }

    h1, h2 {
      color: #c9184a;
    }

    .heart {
      font-size: 80px;
      cursor: pointer;
      animation: latido 1.2s infinite;
      margin: 22px 0;
    }

    button {
      background: #c9184a;
      color: white;
      border: none;
      border-radius: 999px;
      padding: 14px 28px;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(201, 24, 74, 0.35);
    }

    img {
      width: 100%;
      border-radius: 20px;
      margin: 12px 0 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
    }

    #texto {
      white-space: pre-wrap;
      text-align: left;
      color: #552437;
      font-size: 17px;
      line-height: 1.7;
      min-height: 260px;
    }

    #final {
      display: none;
      color: #c9184a;
      font-size: 34px;
      font-weight: bold;
      margin-top: 18px;
      animation: latido 1.2s infinite;
    }

    @keyframes latido {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    @keyframes aparecer {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

  <script>
    const mensaje = 'Contigo quiero un amor bonito, de esos que ya no se ven, de esos que los ven en la calle y dicen: “wow, cómo ellos se quieren”.\n\nMi plan es hacerte feliz. Mi objetivo es que cada vez que nos veamos nos vuelvan a doler los cachetes de tanto reírnos juntos, porque esos momentos contigo son de mis favoritos.\n\nTal vez no sea el mejor, pero sí quiero serlo para ti.\n\nTe quiero y eres la mujer más bella de la cual me enamoré, y solo quiero salir adelante junto contigo.\n\nEres la mejor. ❤️';

    function abrirCarta() {
      document.getElementById("inicio").classList.remove("active");
      document.getElementById("carta").classList.add("active");

      const texto = document.getElementById("texto");
      const final = document.getElementById("final");
      texto.textContent = "";
      final.style.display = "none";

      let i = 0;
      const escribir = setInterval(function() {
        texto.textContent += mensaje.charAt(i);
        i++;

        if (i >= mensaje.length) {
          clearInterval(escribir);
          final.style.display = "block";
        }
      }, 24);
    }
  </script>
